{{- define "main" }}
<div class="page-grid">
  {{- range .Pages }}
  <a class="page-card" href="{{ .RelPermalink }}">
    <img src="{{ .Params.image }}" alt="{{ .Title }}">
    <span class="page-card-label">{{ .Title }}</span>
  </a>
  {{- end }}
  <a class="page-card" href="https://github.com/LechnerPeter" target="_blank" rel="noopener">
    <img src="/images/github.svg" alt="GitHub">
    <span class="page-card-label">GitHub</span>
  </a>
</div>
{{- end }}

<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#2d1b0e"/>
  <!-- Wood grain hexagon -->
  <polygon points="400,140 470,180 470,260 400,300 330,260 330,180"
           fill="#8b5a2b" stroke="#d4a96a" stroke-width="3"/>
  <!-- Inner hexagon -->
  <polygon points="400,165 448,192 448,248 400,275 352,248 352,192"
           fill="#6b3a1f" stroke="#d4a96a" stroke-width="1.5"/>
  <!-- Letter L -->
  <text x="400" y="248" font-family="serif" font-size="52" font-weight="bold" fill="#d4a96a" text-anchor="middle">L</text>
  <text x="400" y="355" font-family="serif" font-size="28" fill="#e8c99a" text-anchor="middle">Logos</text>
</svg>

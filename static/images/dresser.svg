<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#2d1b0e"/>
  <!-- Dresser body -->
  <rect x="230" y="160" width="340" height="240" rx="4" fill="#6b3a1f" stroke="#d4a96a" stroke-width="3"/>
  <!-- Top drawer -->
  <rect x="245" y="175" width="310" height="65" rx="3" fill="#8b5a2b" stroke="#d4a96a" stroke-width="2"/>
  <circle cx="400" cy="207" r="8" fill="#d4a96a"/>
  <!-- Middle drawer -->
  <rect x="245" y="252" width="310" height="65" rx="3" fill="#8b5a2b" stroke="#d4a96a" stroke-width="2"/>
  <circle cx="400" cy="284" r="8" fill="#d4a96a"/>
  <!-- Bottom drawer -->
  <rect x="245" y="329" width="310" height="58" rx="3" fill="#8b5a2b" stroke="#d4a96a" stroke-width="2"/>
  <circle cx="400" cy="358" r="8" fill="#d4a96a"/>
  <!-- Legs -->
  <rect x="255" y="400" width="20" height="28" rx="3" fill="#6b3a1f"/>
  <rect x="525" y="400" width="20" height="28" rx="3" fill="#6b3a1f"/>
  <text x="400" y="455" font-family="serif" font-size="28" fill="#e8c99a" text-anchor="middle">Dresser</text>
</svg>

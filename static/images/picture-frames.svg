<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#2d1b0e"/>
  <!-- Outer frame -->
  <rect x="260" y="130" width="280" height="220" rx="4" fill="#8b5a2b" stroke="#d4a96a" stroke-width="3"/>
  <!-- Inner frame border -->
  <rect x="282" y="152" width="236" height="176" rx="2" fill="#6b3a1f" stroke="#d4a96a" stroke-width="1.5"/>
  <!-- Picture area -->
  <rect x="294" y="164" width="212" height="152" fill="#1a0f07"/>
  <!-- Simple landscape in frame -->
  <rect x="294" y="264" width="212" height="52" fill="#3d2b1a"/>
  <ellipse cx="360" cy="240" rx="40" ry="50" fill="#2d5a1b"/>
  <rect x="354" y="266" width="12" height="30" fill="#6b3a1f"/>
  <ellipse cx="450" cy="250" rx="30" ry="38" fill="#2d5a1b"/>
  <rect x="444" y="270" width="12" height="24" fill="#6b3a1f"/>
  <text x="400" y="390" font-family="serif" font-size="28" fill="#e8c99a" text-anchor="middle">Picture Frames</text>
</svg>

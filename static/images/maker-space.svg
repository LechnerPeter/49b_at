<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1c2741"/>
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- PCB trace decorations -->
  <g stroke="#1e3a5f" stroke-width="0.9" opacity="0.7">
    <line x1="0" y1="78" x2="118" y2="78"/>
    <line x1="282" y1="78" x2="400" y2="78"/>
    <line x1="0" y1="222" x2="118" y2="222"/>
    <line x1="282" y1="222" x2="400" y2="222"/>
    <circle cx="118" cy="78" r="3.5" fill="none" stroke="#1e3a5f" stroke-width="1.5"/>
    <circle cx="282" cy="78" r="3.5" fill="none" stroke="#1e3a5f" stroke-width="1.5"/>
    <circle cx="118" cy="222" r="3.5" fill="none" stroke="#1e3a5f" stroke-width="1.5"/>
    <circle cx="282" cy="222" r="3.5" fill="none" stroke="#1e3a5f" stroke-width="1.5"/>
  </g>

  <!-- 3D Printer frame -->
  <!-- Left upright -->
  <rect x="133" y="52" width="13" height="193" rx="3" fill="#2d4263"/>
  <!-- Right upright -->
  <rect x="254" y="52" width="13" height="193" rx="3" fill="#2d4263"/>
  <!-- Top bar -->
  <rect x="133" y="52" width="134" height="13" rx="3" fill="#3d5a80"/>
  <!-- Base -->
  <rect x="123" y="232" width="154" height="13" rx="3" fill="#3d5a80"/>

  <!-- X-axis rod -->
  <rect x="143" y="126" width="114" height="7" rx="3.5" fill="#4a6fa5"/>

  <!-- Print head -->
  <rect x="184" y="113" width="32" height="32" rx="3" fill="#2d4263" stroke="#4a6fa5" stroke-width="1"/>
  <!-- Heating block -->
  <rect x="190" y="137" width="20" height="13" rx="1" fill="#b91c1c"/>
  <!-- Nozzle -->
  <polygon points="194,150 206,150 203,163 197,163" fill="#94a3b8"/>

  <!-- Object being printed -->
  <rect x="178" y="170" width="44" height="34" rx="1" fill="#16a34a" opacity="0.75"/>
  <line x1="178" y1="176" x2="222" y2="176" stroke="#15803d" stroke-width="0.9"/>
  <line x1="178" y1="182" x2="222" y2="182" stroke="#15803d" stroke-width="0.9"/>
  <line x1="178" y1="188" x2="222" y2="188" stroke="#15803d" stroke-width="0.9"/>
  <line x1="178" y1="194" x2="222" y2="194" stroke="#15803d" stroke-width="0.9"/>

  <!-- Build plate -->
  <rect x="148" y="204" width="104" height="9" rx="2" fill="#334155"/>

  <!-- Filament spool (top right) -->
  <circle cx="332" cy="108" r="37" fill="none" stroke="#2d4263" stroke-width="7"/>
  <circle cx="332" cy="108" r="15" fill="#1e293b"/>
  <circle cx="332" cy="108" r="5" fill="#4a6fa5"/>
  <circle cx="332" cy="108" r="37" fill="none" stroke="#16a34a" stroke-width="3.5" opacity="0.5"/>
  <circle cx="332" cy="108" r="31" fill="none" stroke="#16a34a" stroke-width="2" opacity="0.3"/>
  <!-- Filament line to printer -->
  <path d="M295,108 Q274,112 265,128" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="4,3" opacity="0.65"/>

  <!-- MCU chip (top left) -->
  <rect x="36" y="85" width="66" height="52" rx="3" fill="#1a2f4a" stroke="#22c55e" stroke-width="1.2"/>
  <!-- Notch -->
  <path d="M56,85 A13,13 0 0 1 82,85" fill="none" stroke="#22c55e" stroke-width="1.2"/>
  <!-- Legs left -->
  <line x1="36" y1="95" x2="26" y2="95" stroke="#4a6fa5" stroke-width="2.5"/>
  <line x1="36" y1="105" x2="26" y2="105" stroke="#4a6fa5" stroke-width="2.5"/>
  <line x1="36" y1="115" x2="26" y2="115" stroke="#4a6fa5" stroke-width="2.5"/>
  <line x1="36" y1="125" x2="26" y2="125" stroke="#4a6fa5" stroke-width="2.5"/>
  <!-- Legs right -->
  <line x1="102" y1="95" x2="112" y2="95" stroke="#4a6fa5" stroke-width="2.5"/>
  <line x1="102" y1="105" x2="112" y2="105" stroke="#4a6fa5" stroke-width="2.5"/>
  <line x1="102" y1="115" x2="112" y2="115" stroke="#4a6fa5" stroke-width="2.5"/>
  <line x1="102" y1="125" x2="112" y2="125" stroke="#4a6fa5" stroke-width="2.5"/>
  <!-- Label -->
  <text x="69" y="118" text-anchor="middle" font-family="monospace" font-size="11" fill="#22c55e" opacity="0.9">MCU</text>
  <!-- Trace to printer area -->
  <line x1="112" y1="115" x2="133" y2="115" stroke="#22c55e" stroke-width="0.9" opacity="0.4"/>

  <!-- LEDs -->
  <circle cx="48" cy="152" r="5.5" fill="#22c55e"/>
  <circle cx="48" cy="152" r="9" fill="#22c55e" opacity="0.18"/>
  <circle cx="64" cy="152" r="5.5" fill="#f59e0b"/>
  <circle cx="64" cy="152" r="9" fill="#f59e0b" opacity="0.18"/>
  <circle cx="80" cy="152" r="5.5" fill="#3b82f6"/>
  <circle cx="80" cy="152" r="9" fill="#3b82f6" opacity="0.18"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1c2741"/>
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Pegboard background (tool wall) -->
  <rect x="20" y="20" width="360" height="260" rx="4" fill="#1a2332"/>
  <g fill="#243447" opacity="0.7">
    <!-- Pegboard holes grid -->
    <circle cx="52"  cy="50"  r="3"/><circle cx="84"  cy="50"  r="3"/><circle cx="116" cy="50"  r="3"/>
    <circle cx="148" cy="50"  r="3"/><circle cx="180" cy="50"  r="3"/><circle cx="212" cy="50"  r="3"/>
    <circle cx="244" cy="50"  r="3"/><circle cx="276" cy="50"  r="3"/><circle cx="308" cy="50"  r="3"/>
    <circle cx="340" cy="50"  r="3"/>
    <circle cx="52"  cy="82"  r="3"/><circle cx="84"  cy="82"  r="3"/><circle cx="116" cy="82"  r="3"/>
    <circle cx="148" cy="82"  r="3"/><circle cx="180" cy="82"  r="3"/><circle cx="212" cy="82"  r="3"/>
    <circle cx="244" cy="82"  r="3"/><circle cx="276" cy="82"  r="3"/><circle cx="308" cy="82"  r="3"/>
    <circle cx="340" cy="82"  r="3"/>
    <circle cx="52"  cy="240" r="3"/><circle cx="84"  cy="240" r="3"/><circle cx="116" cy="240" r="3"/>
    <circle cx="148" cy="240" r="3"/><circle cx="180" cy="240" r="3"/><circle cx="212" cy="240" r="3"/>
    <circle cx="244" cy="240" r="3"/><circle cx="276" cy="240" r="3"/><circle cx="308" cy="240" r="3"/>
    <circle cx="340" cy="240" r="3"/>
  </g>

  <!-- Hand plane (left) -->
  <g transform="translate(48,100)">
    <!-- Body -->
    <rect x="0" y="10" width="80" height="28" rx="3" fill="#475569"/>
    <!-- Sole -->
    <rect x="0" y="34" width="80" height="6" rx="1" fill="#64748b"/>
    <!-- Blade mouth -->
    <rect x="34" y="34" width="12" height="6" fill="#1e293b"/>
    <!-- Tote (rear handle) -->
    <path d="M62,10 Q72,4 76,10 Q78,18 72,22 L62,22 Z" fill="#854d0e"/>
    <!-- Knob (front) -->
    <ellipse cx="18" cy="12" rx="8" ry="10" fill="#854d0e"/>
    <ellipse cx="18" cy="10" rx="5" ry="3" fill="#92400e"/>
    <!-- Cap iron screw -->
    <circle cx="40" cy="22" r="3" fill="#94a3b8"/>
    <!-- Blade (visible) -->
    <rect x="32" y="14" width="16" height="22" rx="1" fill="#94a3b8" opacity="0.8"/>
  </g>

  <!-- Mallet (center) -->
  <g transform="translate(168,95)">
    <!-- Handle -->
    <rect x="27" y="0" width="10" height="120" rx="4" fill="#92400e"/>
    <!-- Grip wrap -->
    <rect x="26" y="80" width="12" height="30" rx="3" fill="#7c2d12"/>
    <!-- Head -->
    <rect x="0" y="10" width="64" height="50" rx="6" fill="#a16207"/>
    <!-- Head end grain -->
    <ellipse cx="0"  cy="35" rx="6" ry="25" fill="#854d0e"/>
    <ellipse cx="64" cy="35" rx="6" ry="25" fill="#854d0e"/>
    <!-- Wood grain on face -->
    <line x1="10" y1="14" x2="10" y2="56" stroke="#854d0e" stroke-width="1" opacity="0.5"/>
    <line x1="22" y1="12" x2="22" y2="58" stroke="#854d0e" stroke-width="1" opacity="0.5"/>
    <line x1="42" y1="12" x2="42" y2="58" stroke="#854d0e" stroke-width="1" opacity="0.5"/>
    <line x1="54" y1="14" x2="54" y2="56" stroke="#854d0e" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Chisels (right, hanging on pegboard) -->
  <g transform="translate(295,95)">
    <!-- Chisel 1 (wide) -->
    <rect x="0"  y="0" width="10" height="50" rx="2" fill="#854d0e"/>
    <rect x="-2" y="46" width="14" height="4" rx="1" fill="#475569"/>
    <polygon points="-2,50 12,50 8,80 2,80" fill="#94a3b8"/>
    <line x1="3"  y1="52" x2="3"  y2="78" stroke="#64748b" stroke-width="0.7"/>
    <line x1="7"  y1="52" x2="7"  y2="78" stroke="#64748b" stroke-width="0.7"/>
    <!-- Chisel 2 (medium) -->
    <rect x="22" y="0" width="8" height="48" rx="2" fill="#7c2d12"/>
    <rect x="20" y="44" width="12" height="4" rx="1" fill="#475569"/>
    <polygon points="20,48 32,48 28.5,75 23.5,75" fill="#94a3b8"/>
    <!-- Chisel 3 (narrow) -->
    <rect x="42" y="0" width="7" height="46" rx="2" fill="#854d0e"/>
    <rect x="40" y="42" width="11" height="4" rx="1" fill="#475569"/>
    <polygon points="40,46 51,46 48,72 43,72" fill="#94a3b8"/>
    <!-- Peg hooks -->
    <circle cx="5"  cy="4"  r="3" fill="#475569"/>
    <circle cx="26" cy="4"  r="3" fill="#475569"/>
    <circle cx="45" cy="4"  r="3" fill="#475569"/>
  </g>

  <!-- Tape measure (bottom left) -->
  <g transform="translate(52,195)">
    <rect x="0" y="0" width="50" height="40" rx="6" fill="#f59e0b"/>
    <rect x="4" y="4" width="42" height="32" rx="4" fill="#d97706"/>
    <rect x="46" y="16" width="16" height="8" rx="2" fill="#e2e8f0"/>
    <text x="25" y="26" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#1e293b">5m</text>
    <circle cx="25" cy="38" r="4" fill="#d97706"/>
  </g>

  <!-- Marking gauge (bottom center) -->
  <g transform="translate(165,195)">
    <rect x="10" y="0"  width="10" height="80" rx="3" fill="#92400e"/>
    <rect x="0"  y="16" width="30" height="12" rx="3" fill="#a16207"/>
    <circle cx="6"  cy="22" r="3" fill="#475569"/>
    <circle cx="24" cy="22" r="3" fill="#475569"/>
    <line x1="15" y1="72" x2="12" y2="80" stroke="#94a3b8" stroke-width="2"/>
  </g>

  <!-- Squares (bottom right) -->
  <g transform="translate(260,180)" stroke="#64748b" stroke-width="2" fill="none">
    <!-- Try square -->
    <rect x="0"  y="0"  width="12" height="60" rx="2" fill="#475569" stroke="none"/>
    <rect x="0"  y="0"  width="55" height="10" rx="2" fill="#475569" stroke="none"/>
    <!-- Blade markings -->
    <line x1="16" y1="5"  x2="16" y2="10" stroke="#94a3b8" stroke-width="1"/>
    <line x1="26" y1="3"  x2="26" y2="10" stroke="#94a3b8" stroke-width="1"/>
    <line x1="36" y1="5"  x2="36" y2="10" stroke="#94a3b8" stroke-width="1"/>
    <line x1="46" y1="3"  x2="46" y2="10" stroke="#94a3b8" stroke-width="1"/>
  </g>
</svg>

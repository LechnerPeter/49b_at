baseURL = "https://49b.at/"
defaultContentLanguage = "en"
title = "Peter Lechner"
theme = "PaperMod"

[languages]
  [languages.en]
    locale = "en"
    label = "EN"
    weight = 1
  [languages.de]
    locale = "de"
    label = "DE"
    weight = 2

[markup.goldmark.renderer]
  unsafe = true

[params]
  author = "Peter Lechner"
  defaultTheme = "dark"
  disableThemeToggle = true

[params.label]
  iconSVG = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;vertical-align:middle"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/LechnerPeter"

[privacy]
  [privacy.googleAnalytics]
    disable = true
  [privacy.disqus]
    disable = true
